name: Build for iOS

on:
  workflow_dispatch:

jobs:
  build:
    name: Release IOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept

      - name: Build iOS with Xcode directly
        run: |
          cd ios
          pod install
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
          cd ..
          mv ios/build/Release-iphoneos build/ios/iphoneos
          ln -sf ./build/ios/iphoneos Payload
          find Payload/Runner.app/Frameworks -type d -name "*.framework" -exec codesign --force --sign - --preserve-metadata=identifier,entitlements {} \;
          zip -r9 Flutter_TVBox_ios.ipa Payload/Runner.app

      - name: Upload ios release
        uses: actions/upload-artifact@v4
        with:
          archive: false
          name: iOS-release
          path: Flutter_TVBox_ios.ipa
